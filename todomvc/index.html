<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TodoMVC</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E">
    <link rel="stylesheet" href="css/app.css">
  </head>
  <body>
    <main class="todoapp" data-app>
      <header class="header">
        <h1>todos</h1>
        <input
          class="new-todo"
          name="new-todo"
          placeholder="What needs to be done?"
          autocomplete="off"
          autofocus
        >
      </header>

      <section class="main" hidden>
        <input id="toggle-all" class="toggle-all" type="checkbox">
        <label for="toggle-all">Mark all as complete</label>
        <ul class="todo-list" aria-label="Todo list"></ul>
      </section>

      <footer class="footer" hidden>
        <span class="todo-count"><strong>0</strong> items left</span>
        <ul class="filters" aria-label="Todo filters">
          <li>
            <a class="selected" href="#/">All</a>
          </li>
          <li>
            <a href="#/active">Active</a>
          </li>
          <li>
            <a href="#/completed">Completed</a>
          </li>
        </ul>
        <button class="clear-completed" hidden>Clear completed</button>
      </footer>
    </main>

    <footer class="info">
      <p>Double-click to edit a todo</p>
      <p>Part of TodoMVC</p>
    </footer>

    <script src="js/app.js" type="module"></script>
  </body>
</html>

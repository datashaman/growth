# Mirrors GitHub pull request, check run, workflow run, deployment, and
# release activity into Growth. Set the GROWTH_URL repo variable to the
# Growth instance URL and the GROWTH_MCP_TOKEN repo secret to a Passport
# personal access token with the mcp:use scope. Bind this repository
# (datashaman/growth) to a project's github_repo field in Growth.
name: Growth sync

on:
  pull_request:
    types: [opened, synchronize, closed]
  check_run:
    types: [completed]
  workflow_run:
    workflows: [CI]
    types: [completed]
  deployment_status:
  release:
    types: [published]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: datashaman/growth/actions/growth-sync@main
        with:
          growth-url: ${{ vars.GROWTH_URL }}
          growth-token: ${{ secrets.GROWTH_MCP_TOKEN }}

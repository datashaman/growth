name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    # Production runs on PostgreSQL; the suite is exercised against it here so
    # driver-specific behaviour (schema grammar, transaction semantics) fails
    # CI rather than the deploy. SQLite stays the fast default for local runs.
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: growth
          POSTGRES_PASSWORD: growth
          POSTGRES_DB: growth_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U growth"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: growth_ci
      DB_USERNAME: growth
      DB_PASSWORD: growth

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
          extensions: pdo_pgsql, pgsql
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm

      - name: Cache composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Install Node dependencies
        run: npm ci

      - name: Build Vite assets
        run: npm run build

      - name: Copy env
        run: cp .env.example .env

      - name: Generate key
        run: php artisan key:generate

      - name: Generate Passport keys
        run: php artisan passport:keys --no-interaction

      - name: Pint
        run: vendor/bin/pint --test --format agent

      - name: Tests
        run: php artisan test --compact

      - name: Growth-sync action tests
        run: node --test
        working-directory: actions/growth-sync

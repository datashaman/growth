name: Growth sync
description: Translate GitHub pull request events into Growth MCP delivery-link evidence.

inputs:
  growth-url:
    description: Base URL of the Growth instance, e.g. https://growth.example.com
    required: true
  growth-token:
    description: Passport personal access token with the mcp:use scope.
    required: true
  github-token:
    description: Token used to read commit messages, post the attribution check, and ingest the visual-evidence artifact into a screenshot-gallery comment via the GitHub REST API. Needs the checks:write, actions:read, and pull-requests:write permissions.
    required: false
    default: ${{ github.token }}
  attribution-check:
    description: 'How an unattributed pull request is reported: "blocking" fails the Growth attribution check, "advisory" reports it as neutral.'
    required: false
    default: blocking

runs:
  using: composite
  steps:
    - shell: bash
      run: node "${{ github.action_path }}/index.mjs"
      env:
        GROWTH_URL: ${{ inputs.growth-url }}
        GROWTH_TOKEN: ${{ inputs.growth-token }}
        GITHUB_TOKEN: ${{ inputs.github-token }}
        GROWTH_ATTRIBUTION_CHECK: ${{ inputs.attribution-check }}

# Copy this file to .github/workflows/growth-sync.yml in the repo you want
# to track. Set the GROWTH_MCP_TOKEN repo secret to a Passport personal
# access token with the mcp:use scope, and bind the project's github_repo
# field to this repository (owner/repo) in Growth. Replace growth-url below
# with your Growth instance URL, or use ${{ vars.GROWTH_URL }} to keep it
# out of the repo.
#
# Name feature branches with a "WI-<number>" or "CR-<number>" reference
# (e.g. WI-42-add-login or feature/cr-007) and growth-sync attributes the
# pull request automatically. See the README "Attribution" section for
# trailer and explicit branch-link conventions.
name: Growth sync

on:
  pull_request:
    types: [opened, synchronize, closed]
  # check_run fires only for third-party CI (CircleCI, Buildkite, ...).
  # GitHub Actions CI is captured by workflow_run below instead.
  check_run:
    types: [completed]
  # EDIT: list your GitHub Actions CI workflow name(s). This trigger
  # cannot wildcard, and growth-sync runs from the repository default
  # branch. Omit this block if your CI is not GitHub Actions.
  workflow_run:
    workflows: [CI]
    types: [completed]
  deployment_status:
  release:
    types: [published]

# checks:write   — post the "Growth: work item attribution" check.
# actions:read   — find and download the "growth-evidence" build artifact.
# pull-requests:write — post and update the screenshot-gallery comment.
permissions:
  contents: read
  checks: write
  actions: read
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # The growth-sync action lives in the datashaman/growth repo. GitHub
      # Actions can only resolve it if that repo is reachable from this one:
      # it must be public, or shared with this repo via the organization's
      # Actions access settings. A public repo cannot consume an action from a
      # private one — the run fails with "Unable to resolve action
      # datashaman/growth, not found".
      - uses: datashaman/growth/actions/growth-sync@main
        with:
          growth-url: https://growth.example.com
          growth-token: ${{ secrets.GROWTH_MCP_TOKEN }}
